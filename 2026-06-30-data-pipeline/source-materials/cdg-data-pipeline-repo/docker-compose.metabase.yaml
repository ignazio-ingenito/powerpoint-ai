services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: mysql
      MB_DB_HOST: ${MARIADB_HOST:?MARIADB_HOST is required}
      MB_DB_PORT: ${MARIADB_PORT:-3306}
      MB_DB_DBNAME: ${METABASE_DATABASE:-p-cdgapp-metabase}
      MB_DB_USER: ${MARIADB_USER:?MARIADB_USER is required}
      MB_DB_PASS: ${MARIADB_PASSWORD:?MARIADB_PASSWORD is required}
      MB_ENCRYPTION_SECRET_KEY: ${METABASE_ENCRYPTION_SECRET_KEY:?METABASE_ENCRYPTION_SECRET_KEY is required}
